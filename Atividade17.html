<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 17</title>
</head>
<body>
    <h1>Prática do uso do Const</h1>
    <p>Enteder os valores que não podem ser alterados</p>

    <label for="">Digite seu nome:</label>
    <input type="text" id="nome">

    <label for="">Digite sua idade:</label>
    <input type="text" id="idade">

    <button onclick="mostrar()">mostrar</button>

    <p id="resultado"></p>

    <script>
        const sistema = "Sistema Escolar";

        function mostrar() {
            let nome = document.getElementById("nome").value;
            let idade = document.getElementById("idade").value;

            document.getElementById("resultado").innerHTML = "Bem-vindo "+nome+" que legal! Você tem "+idade+" anos. Com o nosso "+sistema;
        }
    </script>
</body>
</html>
