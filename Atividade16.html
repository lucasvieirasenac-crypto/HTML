<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 16</title>
</head>
<body>
    <h1>A soma de dois números</h1>
    <p>Digite os números para calcular</p>

    <input type="number" name="" id="num1" placeholder="Digite o número">
    <input type="number" name="" id="num2" placeholder="Digite o número">

    <button onclick="soma()">Soma</button>

    <p id="resultado"></p>

    <script>
        function soma() {
            let num1 = Number (document.getElementById("num1").value);
            let num2 = Number (document.getElementById("num2").value);

            let total = num1 + num2;

            document.getElementById("resultado").innerHTML = "O resultado é: "+total;
        }
    </script>
</body>
</html>
