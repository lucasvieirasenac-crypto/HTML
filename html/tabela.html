<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="color:blueviolet"><!--sytle que estilizar a pagina, color -> é cor da letra-->
    <h1 style="font-size: 50px;">Tabela</h1><!--sytle font size é o tamanho da letra-->
    <p style="text-align: justify;">Forma de organizar as informções, dados em um estrutura de colunas e linhas.</p><!--sytle text-align alinhamento do texto-->
    <table style="width: 100%; border-collapse: collapse"><!--Tabela-->
        <tr><!--Linha da tabela-->
            <th style="border: 1px solid black; ">Produto</th><!--Títulos fs tabela th-->
            <th>Descrição</th>
            <th>Preço</th>
        </tr>
        <tr>
            <td>Luva</td><!--Descritivi sem negrito td-->
            <td>Lates</td>
            <td>R$10,00</td>
        </tr>
        <tr>
            <td>Farinha</td><!--Descrição sem negrito td-->
            <td>Fardo</td>
            <td>R$100,00</td>
        </tr>
    </table>
</body>
</html>
